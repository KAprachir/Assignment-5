<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker || Sign In</title>

    <!-- tailwind + Daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>
    <section class="max-w-lg mx-auto my-20">

        <div class="bg-base-100 border-base-300 rounded-box border p-10 space-y-5">
            <img class="mx-auto" src="./assets/github-logo.png" alt="">
            <div>
                <h2 class="text-2xl font-semibold text-center">GitHub Issues Tracker</h2>
                <p class="text-center text-[#64748B]">Sign in to manage your issues</p>
            </div>

            <fieldset class="fieldset">
                <label class="label text-[#1F2937] font-medium">Username</label>
                <input id="userInput" type="text" class="input w-full" placeholder="Enter Username" />

                <label class="label text-[#1F2937] font-medium">Password</label>
                <input id="passwordInput" type="password" class="input w-full" placeholder="Enter Password" />

                <button id="signBtn" class="btn btn-primary mt-4">Sign In</button>
            </fieldset>
            <div class="flex items-center justify-center">
                <hr class="w-50 text-[#E4E4E7]">
                <p>OR</p>
                <hr class="w-50 text-[#E4E4E7]">
            </div>
            <p class="text-center text-[#64748B]">Demo Credentials:</p>
            <div class="text-center w-full bg-slate-100 p-5">
                <p>Username: admin <br> Password: admin123</p>
            </div>
        </div>
    </section>

    <script src="./script/login.js"></script>
</body>

</html>
