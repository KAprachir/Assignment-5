<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- tailwind + Daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="navbar-start">
                <div class="dropdown">
                    <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h8m-8 6h16" />
                        </svg>
                    </div>
                    <ul tabindex="-1"
                        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow gap-4">
                        <li><input type="text" placeholder="Search" class="input input-bordered w-full md:w-auto" />
                        </li>
                        <li><button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button></li>
                    </ul>
                </div>
                <a class="btn btn-ghost text-xl"><img class="w-9 h-9" src="/assets/github-logo.png" alt="">GitHub Issues
                    Tracker</a>
            </div>
            <div class="navbar-end gap-2">
                <input id="searchInput" type="text" placeholder="Search"
                    class="input input-bordered w-24 md:w-auto hidden sm:block" />
                <button class="btn btn-primary hidden sm:flex">
                    <i class="fa-solid fa-plus"></i> New Issue
                </button>
            </div>

        </div>

    </header>
    <main>
        <!-- tab Button -->
        <section class="container w-10/12 mx-auto bg-base-100 rounded shadow-sm p-5 my-10">
            <div class="space-x-2">
                <button id="allTab" onclick="switchTab('all')" class="btn btn-primary w-24">All</button>
                <button id="openTab" onclick="switchTab('open')" class="btn btn-outline w-24">Open</button>
                <button id="closedTab" onclick="switchTab('closed')" class="btn btn-outline w-24">Closed</button>
            </div>
        </section>
    </main>
    <script src="./script/home.js"></script>
</body>

</html>
